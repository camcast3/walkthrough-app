<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <title>Walkthrough Checklist</title>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#a89df7"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#54d66a"/>
      <stop offset="100%" stop-color="#7c6af7"/>
    </linearGradient>
  </defs>
  <!-- Rounded controller body -->
  <rect x="14" y="38" width="100" height="56" rx="28" fill="url(#g1)"/>
  <!-- Left stick -->
  <circle cx="44" cy="66" r="10" fill="#1a1a2e" opacity="0.6"/>
  <!-- Right buttons (dpad-style) -->
  <circle cx="84" cy="58" r="5" fill="#1a1a2e" opacity="0.5"/>
  <circle cx="94" cy="66" r="5" fill="#1a1a2e" opacity="0.5"/>
  <circle cx="84" cy="74" r="5" fill="#1a1a2e" opacity="0.5"/>
  <circle cx="74" cy="66" r="5" fill="#1a1a2e" opacity="0.5"/>
  <!-- Center checkmark -->
  <circle cx="64" cy="66" r="16" fill="#1a1a2e"/>
  <polyline points="55,66 61,73 74,58" fill="none" stroke="url(#g2)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Top bumpers -->
  <rect x="28" y="32" width="28" height="8" rx="4" fill="#1a1a2e" opacity="0.4"/>
  <rect x="72" y="32" width="28" height="8" rx="4" fill="#1a1a2e" opacity="0.4"/>
</svg>