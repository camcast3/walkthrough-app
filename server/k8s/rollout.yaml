apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: walkthrough-server
  namespace: walkthroughs
  labels:
    app: walkthrough-server
spec:
  replicas: 2
  strategy:
    canary:
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 25
        - pause: { duration: 30s }
        - setWeight: 50
        - pause: { duration: 30s }
        - setWeight: 100
  selector:
    matchLabels:
      app: walkthrough-server
  template:
    metadata:
      labels:
        app: walkthrough-server
    spec:
      containers:
        - name: server
          image: ghcr.io/camcast3/walkthrough-server:f07efbcae9804dab65c6123fa19d37e71ad1f6a4
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: walkthrough-db-credentials
                  key: uri
            - name: APP_MODE
              value: server
            - name: GITHUB_REPO
              value: camcast3/walkthrough-app
            - name: GITHUB_PATH
              value: walkthroughs
            - name: GITHUB_BRANCH
              value: main
            - name: GITHUB_CACHE_DIR
              value: /data
            - name: STATIC_DIR
              value: /static
            - name: LISTEN_ADDR
              value: ":8080"
          volumeMounts:
            - name: cache
              mountPath: /data
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: cache
          emptyDir: {}
