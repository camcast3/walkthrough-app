apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: walkthrough-server
  namespace: walkthroughs
  labels:
    app: walkthrough-server
spec:
  replicas: 1
  # Canary with maxSurge=0 ensures old pod is killed before new pod starts (recreate behavior for RWO PVC).
  strategy:
    canary:
      maxSurge: "0"
      maxUnavailable: 1
  selector:
    matchLabels:
      app: walkthrough-server
  template:
    metadata:
      labels:
        app: walkthrough-server
    spec:
      containers:
        - name: server
          image: ghcr.io/camcast3/walkthrough-server:c7168e5d49f8d6e64be9aeb45025c3c1b9c85e7c
          ports:
            - containerPort: 8080
          env:
            - name: DB_PATH
              value: /data/progress.sqlite
            - name: APP_MODE
              value: server
            - name: GITHUB_REPO
              value: camcast3/walkthrough-app
            - name: GITHUB_PATH
              value: walkthroughs
            - name: GITHUB_BRANCH
              value: main
            - name: GITHUB_CACHE_DIR
              value: /data
            - name: STATIC_DIR
              value: /static
            - name: LISTEN_ADDR
              value: ":8080"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /api/walkthroughs
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: walkthrough-data
