apiVersion: apps/v1
kind: Deployment
metadata:
  name: walkthrough-server
  namespace: walkthroughs
  labels:
    app: walkthrough-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: walkthrough-server
  strategy:
    type: Recreate   # single replica + PVC — use Recreate to avoid mount conflicts
  template:
    metadata:
      labels:
        app: walkthrough-server
    spec:
      containers:
        - name: server
          image: ghcr.io/YOUR_GITHUB_USER/walkthrough-server:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_PATH
              value: /data/progress.sqlite
            - name: WALKTHROUGHS_DIR
              value: /walkthroughs
            - name: STATIC_DIR
              value: /static
            - name: LISTEN_ADDR
              value: ":8080"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: walkthroughs
              mountPath: /walkthroughs
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /api/walkthroughs
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: walkthrough-data
        - name: walkthroughs
          configMap:
            name: walkthrough-files   # populated by CI/CD — see deploy workflow
