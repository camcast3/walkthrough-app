apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: walkthrough-server
  namespace: walkthroughs
spec:
  parentRefs:
    - name: YOUR_GATEWAY_NAME         # name of your Cilium Gateway resource
      namespace: YOUR_GATEWAY_NAMESPACE  # namespace where the Gateway lives (e.g. kube-system)
  hostnames:
    - "walkthroughs.YOUR_DOMAIN"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: walkthrough-server
          port: 80
