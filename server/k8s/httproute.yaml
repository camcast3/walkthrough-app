apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: walkthrough-server
  namespace: walkthroughs
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: kube-system
  hostnames:
    - walkthroughs.local.negativezone.cc
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: walkthrough-server
          port: 80
