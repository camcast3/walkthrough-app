# ArgoCD Application for walkthrough-app
#
# Add this to the-basement repo at:
#   kubernetes/apps/walkthrough-app.yaml
#
# NOT in kubernetes/platform/argocd/apps/ — that's for platform
# infrastructure. User workloads go in kubernetes/apps/.
#
# You also need a workloads app-of-apps in the-basement at:
#   kubernetes/platform/argocd/apps/workloads.yaml
# (see README for the manifest)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: walkthrough-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/camcast3/walkthrough-app.git
    targetRevision: main
    path: server/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: walkthroughs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
