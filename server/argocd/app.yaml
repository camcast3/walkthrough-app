# ArgoCD Application — apply once to register this repo:
#   kubectl apply -f server/argocd/app.yaml -n argocd
#
# After that, ArgoCD watches server/k8s/ on main and syncs automatically.
# No need to add anything to the-basement — this app manages itself.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: walkthrough-app
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: server=ghcr.io/camcast3/walkthrough-server
    argocd-image-updater.argoproj.io/server.update-strategy: semver
    argocd-image-updater.argoproj.io/server.kustomize.image-name: ghcr.io/camcast3/walkthrough-server
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/camcast3/walkthrough-app.git
    targetRevision: main
    path: server/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: walkthroughs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
