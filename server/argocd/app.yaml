# Add this to the-basement repo at:
#   kubernetes/platform/argocd/apps/walkthrough-app.yaml
#
# The root app-of-apps will pick it up automatically.
# No manual kubectl apply needed.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: walkthrough-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/camcast3/walkthrough-app.git
    targetRevision: main
    path: server/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: walkthroughs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
