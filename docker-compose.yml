services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_PATH: /data/progress.sqlite
      APP_MODE: client
      REMOTE_SERVER_URL: http://walkthroughs.local.negativezone.cc
      LOCAL_CACHE_DIR: /data
      STATIC_DIR: /static
      LISTEN_ADDR: ":8080"
    volumes:
      - server-data:/data
      - ./webapp/build:/static:ro
    restart: unless-stopped

volumes:
  server-data:
