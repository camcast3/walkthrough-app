name: Build and Update Manifests

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'webapp/**'
      - '.github/workflows/deploy.yml'
      - '!server/k8s/**'
      - '!server/argocd/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/walkthrough-server

jobs:
  server-tests:
    name: Go server tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - run: go build ./...
      - run: go test ./... -timeout 60s

  webapp-tests:
    name: Webapp unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run check
      - run: npm run test

  build-and-update:
    needs: [server-tests, webapp-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit manifest updates back to main
      packages: write   # needed to push to ghcr.io

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── Determine next version ─────────────────────────────────────────
      - name: Determine next version
        id: version
        run: |
          # Get latest semver tag, default to v0.0.0 if none exist
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          # Bump patch version
          MAJOR=$(echo "$LATEST" | cut -d. -f1)
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT (previous: $LATEST)"

      # ── Build + push Docker image ─────────────────────────────────────────
      # The multi-stage Dockerfile builds the webapp, Go server, and bakes in
      # walkthroughs — no ConfigMap needed.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ── Update manifests — ArgoCD detects the commit and syncs ───────────
      - name: Update image tag in Rollout manifest
        run: |
          sed -i "s|image: ghcr.io/.*/walkthrough-server:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|" \
            server/k8s/rollout.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server/k8s/rollout.yaml
          git diff --cached --quiet || \
            git commit -m "ci: update image to ${GITHUB_SHA::8} [skip ci]"
          git pull --rebase origin main
          git push

      # ── Create GitHub release ────────────────────────────────────────────
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --target main
