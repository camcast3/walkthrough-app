name: Build and Update Manifests

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/walkthrough-server

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit manifest updates back to main
      packages: write   # needed to push to ghcr.io

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Build webapp ──────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Install webapp dependencies
        run: npm ci --legacy-peer-deps
        working-directory: webapp

      - name: Build webapp
        run: npm run build
        working-directory: webapp

      # ── Build + push Docker image ─────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ── Update manifests — ArgoCD detects the commit and syncs ───────────
      # No KUBECONFIG needed: kubectl dry-run generates the ConfigMap locally.
      - name: Set up kubectl (local ConfigMap generation only — no cluster access)
        uses: azure/setup-kubectl@v3

      - name: Generate walkthrough ConfigMap
        run: |
          kubectl create configmap walkthrough-files \
            --from-file=walkthroughs/ \
            --namespace=walkthroughs \
            --dry-run=client -o yaml > server/k8s/walkthrough-configmap.yaml

      - name: Update image tag in Rollout manifest
        run: |
          sed -i "s|image: ghcr.io/.*/walkthrough-server:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|" \
            server/k8s/rollout.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server/k8s/rollout.yaml server/k8s/walkthrough-configmap.yaml
          git diff --cached --quiet || \
            git commit -m "ci: update image to ${GITHUB_SHA::8} and walkthrough ConfigMap [skip ci]"
          git pull --rebase origin main
          git push
