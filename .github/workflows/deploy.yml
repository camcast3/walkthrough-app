name: Build and Release

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'webapp/**'
      - '.github/workflows/deploy.yml'
      - '!server/k8s/**'
      - '!server/argocd/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/walkthrough-server

jobs:
  server-tests:
    name: Go server tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - run: go build ./...
      - run: go test ./... -timeout 60s

  webapp-tests:
    name: Webapp unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run check
      - run: npm run test

  build-and-release:
    needs: [server-tests, webapp-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub releases
      packages: write   # needed to push to ghcr.io

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Determine next version ─────────────────────────────────────────
      - name: Determine next version
        id: version
        run: |
          # Get latest semver tag, default to v0.0.0 if none exist
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          # Bump patch version
          MAJOR=$(echo "$LATEST" | cut -d. -f1)
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT (previous: $LATEST)"

      # ── Build + push Docker image ─────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          build-args: SERVER_VERSION=${{ steps.version.outputs.tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ── Cross-compile binaries + bundle static files ──────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Build webapp static files
        working-directory: webapp
        run: npm ci --legacy-peer-deps && npm run build

      - name: Cross-compile server binaries
        run: |
          mkdir -p dist
          cd server
          LDFLAGS="-X main.Version=${{ steps.version.outputs.tag }}"
          GOOS=linux   GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o ../dist/walkthrough-server-linux-amd64 .
          GOOS=linux   GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o ../dist/walkthrough-server-linux-arm64 .
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o ../dist/walkthrough-server-windows-amd64.exe .

      - name: Bundle static files
        run: tar -czf dist/static.tar.gz -C webapp/build .

      # ── Create GitHub release ────────────────────────────────────────────
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --target "${{ github.sha }}" \
            dist/walkthrough-server-linux-amd64 \
            dist/walkthrough-server-linux-arm64 \
            dist/walkthrough-server-windows-amd64.exe \
            dist/static.tar.gz
