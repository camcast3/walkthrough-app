name: Deploy to Kubernetes

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/walkthrough-server

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # ── Build webapp ──────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Install webapp dependencies
        run: npm ci --legacy-peer-deps
        working-directory: webapp

      - name: Build webapp
        run: npm run build
        working-directory: webapp

      # ── Build + push Docker image ─────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ── Create walkthrough ConfigMap ──────────────────────────────────────
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Create namespace if needed
        run: kubectl create namespace walkthroughs --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy walkthrough JSONs as ConfigMap
        run: |
          kubectl create configmap walkthrough-files \
            --from-file=walkthroughs/ \
            --namespace=walkthroughs \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── Apply k8s manifests + rollout ─────────────────────────────────────
      - name: Apply k8s manifests
        run: kubectl apply -f server/k8s/ --namespace=walkthroughs

      - name: Update image in deployment
        run: |
          kubectl set image deployment/walkthrough-server \
            server=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --namespace=walkthroughs

      - name: Wait for rollout
        run: kubectl rollout status deployment/walkthrough-server --namespace=walkthroughs --timeout=120s
